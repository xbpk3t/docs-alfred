name: docs-alfred
version: 0.1.0
description: Project-level APM manifest for the docs repository
author: luck
license: MIT
targets:
  - claude
  - codex
includes:
  - .apm/instructions
dependencies:
  apm:
    - git: https://github.com/cxuu/golang-skills
      skills:
        - go-concurrency
        - go-interfaces
        - go-testing
        - go-error-handling
        - go-performance
        - go-data-structures
        - go-context
        - go-defensive
        - go-functional-options
        - go-packages
        - go-generics
        - go-linting
        - go-functions
        - go-control-flow
        - go-declarations
        - go-logging # zap

