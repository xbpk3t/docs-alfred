feed:
  timeout: 30 # HTTP timeout per request (seconds). With 5 retries: 5+10+20+40+80+160 ≈ 315s total
  maxTries: 5  # Max retry attempts per feed
  feedLimit: 30 # Max items per feed

resend:
  token: sk   # Resend API key
  mailTo: [me@lucc.dev]

newsletter:
  schedule: daily        # daily (24h) or weekly (7 days)
  isHideAuthorInTitle: false

dashboard:
  isShowFetchFailedFeeds: true
  isShowFeedDetail: true

env:
  debug: false  # Write HTML to disk instead of sending email

# -- Transcript (trns) configuration --
trns:
  sources:
    - feedUrl: https://example.com/podcast/feed.xml
      asr: true
      language: en
      maxEpisodes: 10
      maxAgeDays: 90
  asr:
    enabled: false         # Enable ASR fallback via pt CLI
    language: en
    # cliPath: /usr/local/bin/pt
  summary:
    enabled: true          # AI summary generation
    model: gpt-4o
    language: en
  temporaryUpload:
    enabled: false         # Upload transcripts to Litterbox
    expiration: 24h        # 1h, 12h, 24h, 72h

# -- Source discovery (hunt) configuration --
hunt:
  # Categories to exclude from scanning (optional)
  # categories:
  #   except: [news, social]
  # Provider weights for scoring
  providerWeights:
    exa: 1.0
    tavily: 0.9
  # Candidate type weights
  typeWeights:
    source: 1.0
    author: 0.9
    newsletter: 0.8
    repo: 0.7
    unknown: 0.5
  # Additional blocked domains beyond defaults
  blockedDomains:
    - example.com

# -- Wiki configuration --
wiki:
  wikiRootDir: wiki
  ghTopicsDir: wiki/ghTopicsPath
  ai:
    model: gpt-4o
    # baseUrl: https://api.openai.com/v1
    # apiKey: (uses OPENAI_API_KEY env var by default)

feeds:
  - type: coding
    urls:
      - feed: https://blog.lucc.dev/rss.xml
        url: https://blog.lucc.dev/
        des: 【Lucas Blog】
      - feed: http://mysql.taobao.org//monthly/feed.xml
        url: http://mysql.taobao.org//monthly/
        des: 【数据库内核月报】

  - type: videos
    urls:
      - feed: https://www.youtube.com/feeds/videos.xml?channel_id=UCxXlhuIa3ggzVzkN1hVq3ug
        url: https://www.youtube.com/@BernieSanders/videos
      - feed: https://www.youtube.com/feeds/videos.xml?channel_id=UCxXlhuIa3ggzVzkN1hVq3ug
        url: https://www.youtube.com/@AOC/videos
      - feed: https://www.youtube.com/feeds/videos.xml?channel_id=UCMxiv15iK_MFayY_3fU9loQ
        url: https://www.youtube.com/@UnHerd/videos
