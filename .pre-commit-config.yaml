fail_fast: false
default_stages: [pre-commit, pre-push]

repos:
  # Disabled meta hooks due to nix environment compatibility issues
  #  - repo: meta
  #    hooks:
  #      - id: identity
  #        exclude: ^/nix/store/
  #      - id: check-useless-excludes
  #        exclude: ^/nix/store/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: end-of-file-fixer
      - id: check-added-large-files # 定义的hook脚本，在repo的.pre-commit-hooks.yaml中定义
        args: ["--maxkb=5120"]
      - id: trailing-whitespace # 移除尾部空格符
      - id: check-merge-conflict # 检查是否含有合并冲突符号
      - id: check-json
      - id: check-symlinks
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
      - id: check-pre-commit-ci-config

  - repo: local
    hooks:
      - id: gitlint
        name: Git Commit Message Linter
        entry: gitlint
        args: [--staged, --msg-filename]
        language: system
        stages: [commit-msg]

      - id: gitlint-ci
        name: gitlint ci
        entry: gitlint
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]

  - repo: local
    hooks:
      - id: commitizen
        name: commitizen check
        entry: cz check
        args: [--allow-abort, --commit-msg-file]
        language: system
        stages: [commit-msg]

      - id: commitizen-branch
        name: commitizen check branch
        entry: cz check
        args: [--rev-range, '$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF']
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/

  #  - repo: https://github.com/shellcheck-py/shellcheck-py
  #    rev: v0.10.0.1
  #    hooks:
  #      - id: shellcheck
  #        types: [shell]
  #
  #  - repo: https://github.com/pre-commit/mirrors-eslint
  #    rev: v9.29.0
  #    hooks:
  #      - id: eslint
  #        files: \.[jt]sx?$  # *.js, *.jsx, *.ts and *.tsx
  #        types: [file]

  - repo: local
    hooks:
      - id: markdownlint
        alias: md
        name: Lint Markdown files
        entry: markdownlint -f -c .github/linters/markdownlint.yml -i node_modules
        types: [markdown]
        language: system
        files: ^blog/

  - repo: local
    hooks:
      - id: yamllint
        name: Lint YAML files
        entry: yamllint -c .github/linters/yamllint.yml .
        types: [yaml]
        language: system


  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

#  - repo: https://github.com/gitleaks/gitleaks
#    rev: v8.28.0
#    hooks:
#      - id: gitleaks
#        name: Scan Secrets
#        entry: gitleaks detect --source . -v && gitleaks dir . -v


  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.102.0
    hooks:
      - id: terraform_fmt
        args:
          - --hook-config=--tf-path=tofu
          - --args=-diff

  #  - repo: local
  #    hooks:
  #      - id: dashboard-linter
  #        name: dashboard-linter
  #        entry: leeway run components/dashboard:lint
  #        language: system
  #        pass_filenames: false
  #        files: ^components/dashboard/

  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles
        entry: hadolint
        language: system
        types: [dockerfile]


  # Remote exception: the current golangci-lint.yml is not accepted by local golangci-lint 2.12.2.
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.5.0
    hooks:
      - id: golangci-lint-config-verify
        args: ["-c", ".github/linters/golangci-lint.yml"]
      - id: golangci-lint
        entry: golangci-lint run --fix -c .github/linters/golangci-lint.yml
        types: [go]
        language: golang
      - id: golangci-lint-full
        args: ["-c", ".github/linters/golangci-lint.yml"]

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: system
        types: [text]
        files: ^docs/



