fail_fast: false
default_stages: [pre-commit, pre-push]

repos:
  # Disabled meta hooks due to nix environment compatibility issues
  #  - repo: meta
  #    hooks:
  #      - id: identity
  #        exclude: ^/nix/store/
  #      - id: check-useless-excludes
  #        exclude: ^/nix/store/

  - repo: local
    hooks:
      - id: check-toml
        name: check toml
        entry: check-toml
        language: system
        types: [toml]

      - id: end-of-file-fixer
        name: fix end of files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      - id: check-added-large-files # 定义的hook脚本，在repo的.pre-commit-hooks.yaml中定义
        name: check for added large files
        entry: check-added-large-files
        language: system
        stages: [pre-commit, pre-push, manual]
        args: ["--maxkb=5120"]

      - id: trailing-whitespace # 移除尾部空格符
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      - id: check-merge-conflict # 检查是否含有合并冲突符号
        name: check for merge conflicts
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: check-json
        name: check json
        entry: check-json
        language: system
        types: [json]

      - id: check-symlinks
        name: check for broken symlinks
        entry: check-symlinks
        language: system
        types: [symlink]

      - id: mixed-line-ending
        name: mixed line ending
        entry: mixed-line-ending
        language: system
        types: [text]

      - id: check-case-conflict
        name: check for case conflicts
        entry: check-case-conflict
        language: system

      - id: check-executables-have-shebangs
        name: check that executables have shebangs
        entry: check-executables-have-shebangs
        language: system
        types: [text, executable]
        stages: [pre-commit, pre-push, manual]

      - id: check-shebang-scripts-are-executable
        name: check that scripts with shebangs are executable
        entry: check-shebang-scripts-are-executable
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]

      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        types: [text]

      - id: destroyed-symlinks
        name: detect destroyed symlinks
        entry: destroyed-symlinks
        language: system
        types: [file]
        stages: [pre-commit, pre-push, manual]

  - repo: local
    hooks:
      - id: commitizen
        name: commitizen check
        entry: cz check
        args: [--allow-abort, --commit-msg-file]
        language: system
        stages: [commit-msg]

      - id: commitizen-branch
        name: commitizen check branch
        entry: cz check
        args: [--rev-range, '$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF']
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: actionlint
        name: Lint GitHub Actions workflow files
        entry: actionlint
        language: system
        types: [yaml]
        files: ^\.github/workflows/

  - repo: local
    hooks:
      - id: markdownlint
        alias: md
        name: Lint Markdown files
        entry: markdownlint -f -c .github/linters/markdownlint.yml -i node_modules
        types: [markdown]
        language: system
        files: ^blog/

  - repo: local
    hooks:
      - id: yamllint
        name: Lint YAML files
        entry: yamllint -c .github/linters/yamllint.yml .
        types: [yaml]
        language: system


  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        types: [python]
        require_serial: true

  - repo: local
    hooks:
      - id: gitleaks
        name: Scan Secrets
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: terraform_fmt
        name: Terraform fmt
        entry: tofu fmt -diff
        language: system
        files: \.(tf|tofu|tfvars|(tftest|tofutest|tfmock|tfquery)\.hcl)$
        exclude: \.terraform/.*$

  #  - repo: local
  #    hooks:
  #      - id: dashboard-linter
  #        name: dashboard-linter
  #        entry: leeway run components/dashboard:lint
  #        language: system
  #        pass_filenames: false
  #        files: ^components/dashboard/

  - repo: local
    hooks:
      - id: hadolint
        name: Lint Dockerfiles
        entry: hadolint
        language: system
        types: [dockerfile]


  - repo: local
    hooks:
      - id: go-build
        name: go-build
        description: Fast compilation check (~3s)
        entry: go build ./...
        types: [go]
        language: system
        pass_filenames: false

      - id: golangci-lint-config-verify
        name: golangci-lint-config-verify
        entry: golangci-lint config verify -c .github/linters/golangci-lint.yml
        files: ^\.github/linters/golangci-lint\.yml$
        language: system
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix -c .github/linters/golangci-lint.yml --new-from-rev HEAD
        types: [go]
        language: system
        require_serial: true
        pass_filenames: false

      - id: golangci-lint-full
        name: golangci-lint-full
        entry: golangci-lint run --fix -c .github/linters/golangci-lint.yml
        types: [go]
        language: system
        require_serial: true
        pass_filenames: false

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: system
        types: [text]
        files: ^docs/



